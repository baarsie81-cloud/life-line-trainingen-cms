sections:
  - heading: "Een jaarprogramma voor blijvende scherpte"
    text: "Het Lifesaverprogramma combineert eerste hulp, bedrijfshulpverlening en zwemmend redden in een actief programma voor zwembadorganisaties."
  - heading: "Leren op locatie"
    text: "Bij voorkeur trainen we in de eigen omgeving, waar herkenbaarheid het grootst is en teamafspraken direct geoefend kunnen worden."
