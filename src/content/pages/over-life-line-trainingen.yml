title: "Over Life-Line-Trainingen | Praktijkgerichte veiligheidstrainingen"
description: "Maak kennis met Life-Line-Trainingen: specialist in eerste hulp, reanimatie en waterveiligheid."
eyebrow: "Over Life-Line-Trainingen"
h1: "Expert in eerste hulpverlening in en rond het water."
intro: "Life-Line-Trainingen is ontstaan vanuit praktijkervaring in hulpverlening, zorg en onderwijs. Die combinatie zie je terug in trainingen die duidelijk, actief en afgestemd zijn op de mensen die ze volgen."
heroImage: "/assets/photos/over-instructeur-portret.jpg"
heroAlt: "Instructeur van Life-Line-Trainingen in een zwembadomgeving."
gallery:
  - src: "/assets/photos/zwembad-overzicht-rug.jpg"
    alt: "Life-Line instructeur kijkt uit over het zwembad."
  - src: "/assets/photos/instructeur-zwembad-breed.jpg"
    alt: "Instructeur met reddingsmateriaal aan de rand van het zwembad."
sections:
  - heading: "We trainen mensen in wat ze echt nodig hebben."
    text: "De werkomstandigheden van de cursist staan centraal. Een zwembadteam heeft andere situaties, materialen en risico's dan een instructeur of hulpverlener. Daarom bereiden we trainingen zorgvuldig voor."
  - heading: "Begonnen met eerste hulp, uitgegroeid tot specialist."
    text: "Life-Line-Trainingen werd in 2003 opgericht. Vanuit reanimatie- en eerstehulptrainingen groeide de organisatie door naar een breed aanbod voor zwembadprofessionals, hulpverleners en instructeurs."
